server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: homework-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:homework_plagiarism}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    # Base64 string, replace in production.
    secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjEyMzQ1Njc4OTA=}
    expiration-seconds: ${JWT_EXP_SECONDS:7200}
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENV:development}
  traces-sample-rate: 1.0

info:
  app:
    name: homework-backend
    description: Homework plagiarism and review system backend
