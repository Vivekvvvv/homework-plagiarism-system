/opt/homework/artifacts/*.log
/opt/homework/artifacts/*/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}

/opt/homework/artifacts/*.json
/opt/homework/artifacts/*/*.json {
    weekly
    rotate 8
    missingok
    notifempty
    compress
    delaycompress
}
